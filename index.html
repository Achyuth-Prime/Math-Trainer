<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Addition Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link id="theme-style" rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Screens will be injected here via JS -->
    </div>

    <!-- Theme Switcher for testing options -->
    <div style="position: fixed; bottom: 15px; right: 15px; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 12px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; border: 1px solid rgba(255,255,255,0.2);">
        <span style="color: #fff; font-size: 12px; font-weight: bold; text-align: center; font-family: sans-serif;">Select Theme:</span>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
            <button onclick="document.getElementById('theme-style').href='styles.css'" style="background: #333; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold;">Original (Updated)</button>
            <button onclick="document.getElementById('theme-style').href='styles-brutalism.css'" style="background: #fde047; color: #000; border: 2px solid #000; padding: 6px 10px; border-radius: 0; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: 2px 2px 0 #000;">Neo-Brutalism</button>
            <button onclick="document.getElementById('theme-style').href='styles-retro.css'" style="background: #000; color: #0ff; border: 2px solid #f0f; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; font-family: monospace;">Retro Arcade</button>
            <button onclick="document.getElementById('theme-style').href='styles-clean.css'" style="background: #fff; color: #2563eb; border: 1px solid #cbd5e1; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;">Clean Light</button>
        </div>
        <span style="color: #aaa; font-size: 10px; text-align: center; font-family: sans-serif; margin-top: 5px;">(Remove this before pushing to Git)</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
